plugins {
    id 'java-library'
}

group = 'com.github.punsisi'
version = '1.0.0'

repositories {
    mavenCentral() // JUnit වගේ දේවල් download කරගන්න
}

dependencies {

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}